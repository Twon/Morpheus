name: Clang Tidy

on: workflow_dispatch

env:
  BUILD_TYPE: Debug
  COMPILER_TYPE: clang
  COMPILER_VERSION: 19
  STDLIB: libc++

jobs:
  build:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      os: ubuntu-latest
      build-type: Debug
      compiler-type: clang
      compiler-version: "19"
      conan-compiler: clang
      stdlib: libc++
      cppstd: "23"
      cmake-options: "-DCLANG_TIDY_ENABLE=1"
      install-compiler: false
      run-tests: false
      pre-setup-command: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all
          sudo rm -f /usr/bin/clang /usr/bin/clang++ /usr/bin/clang-tidy
          sudo ln -s /usr/bin/clang-19 /usr/bin/clang
          sudo ln -s /usr/bin/clang++-19 /usr/bin/clang++
          sudo ln -s /usr/bin/clang-tidy-19 /usr/bin/clang-tidy
          sudo apt install -y libc++-19-dev libc++abi-19-dev libunwind-19-dev
