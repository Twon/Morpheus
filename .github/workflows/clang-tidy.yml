name: Clang Tidy

on: workflow_dispatch

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  COMPILER_TYPE: clang
  COMPILER_VERSION: 19
  STDLIB: libc++

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ "ubuntu-latest" ]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Clang
        shell: bash
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.COMPILER_VERSION }} all

          # We need to update symlink otherwise we end up with miss matched clang/clang++ and clang-tidy versions.
          sudo rm /usr/bin/clang
          sudo rm /usr/bin/clang++
          sudo rm /usr/bin/clang-tidy

          sudo ln -s /usr/bin/clang-${{ env.COMPILER_VERSION }} /usr/bin/clang
          sudo ln -s /usr/bin/clang++-${{ env.COMPILER_VERSION }} /usr/bin/clang++
          sudo ln -s /usr/bin/clang-tidy-${{ env.COMPILER_VERSION }} /usr/bin/clang-tidy

      - name: Install Libc++
        shell: bash
        run: |
          sudo apt install -y libc++-${{ env.COMPILER_VERSION }}-dev libc++abi-${{ env.COMPILER_VERSION }}-dev libunwind-${{env.COMPILER_VERSION }}-dev

      - name: Setup Environment
        uses: ./.github/actions/setup-morpheus-env
        with:
          build-type: ${{ env.BUILD_TYPE }}
          compiler-type: ${{ env.COMPILER_TYPE }}
          compiler-version: ${{ env.COMPILER_VERSION }}
          conan-compiler: "clang"
          stdlib: ${{ env.STDLIB }}
          cppstd: 23
          install-compiler: false
          os: "Linux"

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: |
           source build/${{env.BUILD_TYPE}}/generators/conanbuild.sh
           cmake --preset ${{ env.CONAN_PRESET }} -DCLANG_TIDY_ENABLE=1

      - name: Build
        # Build your program with the given configuration
        run: |
           source build/${{env.BUILD_TYPE}}/generators/conanbuild.sh
           cmake --build --preset ${{ env.CONAN_PRESET }}

      - name: Conan Cache Save
        run: |
          conan cache clean
          conan cache save "*/*:*"
