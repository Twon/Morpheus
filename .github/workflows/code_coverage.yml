name: Code Coverage

on:
  schedule:
    - cron: "0 2 * * *"   # Every day at 02:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      os: ubuntu-latest
      build-type: Debug
      compiler-type: gcc
      compiler-version: "12"
      conan-compiler: gcc
      stdlib: libstdc++11
      cppstd: "20"
      install-compiler: false
      cmake-options: "-DENABLE_CODE_COVERAGE=1"
      test-options: "--rerun-failed --output-on-failure"
      pre-setup-command: |
          sudo apt install -y g++-12
          sudo rm -f /usr/bin/gcc /usr/bin/g++ /usr/bin/gcov
          sudo ln -s /usr/bin/gcov-12 /usr/bin/gcov
          sudo ln -s /usr/bin/gcc-12 /usr/bin/gcc
          sudo ln -s /usr/bin/g++-12 /usr/bin/g++
          wget https://github.com/linux-test-project/lcov/archive/refs/tags/v2.0.tar.gz
          tar -xvf v2.0.tar.gz
          cd lcov-2.0 && sudo make install && cd ..
          sudo perl -MCPAN -e 'install Capture::Tiny'
          sudo apt-get install -y libdatetime-perl
      post-build-command: |
          source build/generators/conanbuild.sh
          cmake --build --preset conan-debug --target coverage
          cmake --build --preset conan-debug --target coverage-lcov
          cmake --build --preset conan-debug --target coverage-cobertura
      enable-codecov: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
